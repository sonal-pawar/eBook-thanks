<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Images Thank You Note eBook</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/vendor/booklet/jquery.booklet.latest.css" />
  <link rel="stylesheet" href="assets/style.css?v=43" />
  <script src="assets/ebook-data.js?v=1"></script>
  <script>
    window.__ebookIndex = 0;

    window.__renderEbookFallback = function () {
      var notes = window.__ebookNotes || [];
      var onBackCover = window.__ebookIndex === notes.length;
      var onFrontCover = window.__ebookIndex < 0;
      var imagePath = notes[Math.max(window.__ebookIndex, 0)] || notes[0];
      var pageIndicator = document.getElementById("pageIndicator");
      var prevBtn = document.getElementById("prevBtn");
      var nextBtn = document.getElementById("nextBtn");
      var noteLabel = document.querySelector(".page-label");
      var progressLabel = document.getElementById("progressLabel");
      var progressCount = document.getElementById("progressCount");
      var progressBar = document.getElementById("progressBar");

      if (!notes.length) {
        return;
      }

      if (pageIndicator) {
        pageIndicator.textContent = onFrontCover
          ? "Front Cover"
          : onBackCover
          ? "Back Cover"
          : "Page " + (window.__ebookIndex + 1) + " of " + notes.length + " - " + imagePath.split("/").pop();
      }

      if (noteLabel) {
        noteLabel.textContent = onFrontCover
          ? "Front Cover"
          : onBackCover
          ? "Back Cover"
          : imagePath.split("/").pop().replace(/\.[^.]+$/, "");
      }

      if (progressLabel) {
        progressLabel.textContent = noteLabel ? noteLabel.textContent : "";
      }

      if (progressCount) {
        progressCount.textContent = onFrontCover
          ? "0 / " + notes.length
          : (onBackCover ? notes.length : (window.__ebookIndex + 1)) + " / " + notes.length;
      }

      if (progressBar) {
        progressBar.style.width = ((onFrontCover ? 0 : (onBackCover ? notes.length : (window.__ebookIndex + 1))) / notes.length * 100) + "%";
      }

      if (prevBtn) {
        prevBtn.disabled = window.__ebookIndex <= 0;
      }

      if (nextBtn) {
        nextBtn.disabled = onBackCover;
      }
    };

    window.__changeEbookFallback = function (step) {
      var nextIndex = window.__ebookIndex + step;
      var notes = window.__ebookNotes || [];

      if (nextIndex < -1 || nextIndex > notes.length) {
        return;
      }

      if (typeof window.__changeEbookPage === "function") {
        window.__changeEbookPage(step);
        return;
      }

      window.__ebookIndex = nextIndex;
      window.__renderEbookFallback();
    };

    window.__openEbookFallback = function () {
      var launchPage = document.getElementById("launchPage");
      var ebook = document.getElementById("ebook");

      if (typeof window.__openEbook === "function") {
        window.__openEbook();
        return;
      }

      if (launchPage) {
        launchPage.classList.add("hidden");
        launchPage.style.display = "none";
      }

      if (ebook) {
        ebook.classList.remove("hidden");
        ebook.style.display = "grid";
      }

      window.__renderEbookFallback();
    };

    window.__goHomeFallback = function () {
      var launchPage = document.getElementById("launchPage");
      var ebook = document.getElementById("ebook");

      if (typeof window.__goHome === "function") {
        window.__goHome();
        return;
      }

      if (ebook) {
        ebook.classList.add("hidden");
        ebook.style.display = "none";
      }

      if (launchPage) {
        launchPage.classList.remove("hidden");
        launchPage.style.display = "grid";
      }

      if (window.location.hash === "#ebook") {
        history.replaceState(null, "", window.location.pathname + window.location.search);
      }

      window.__ebookIndex = 0;
    };
  </script>
</head>
<body>
  <section id="launchPage" class="launch-page">
    <div class="launch-overlay"></div>
    <img src="assets/images/Launch Page.png" alt="AI Images Thank You Note Launch Page" class="launch-image" />
    <div class="launch-actions">
      <a id="openBookBtn" class="open-book-btn launch-open-btn" href="#ebook" onclick="window.__openEbookFallback(); return false;">
        <span class="launch-open-text">Open eBook</span>
        <span class="launch-open-arrows" aria-hidden="true">>></span>
      </a>
    </div>
  </section>

  <section id="ebook" class="ebook hidden" aria-live="polite">
    <div class="framework-shell">
      <div class="blur-gallery" aria-hidden="true">
        <div id="blurPrev" class="blur-note blur-prev"></div>
        <div id="blurCurrent" class="blur-note blur-current"></div>
        <div id="blurNext" class="blur-note blur-next"></div>
      </div>
      <div class="book-atmosphere" aria-hidden="true">
        <span class="atmosphere-orb orb-one"></span>
        <span class="atmosphere-orb orb-two"></span>
        <span class="atmosphere-orb orb-three"></span>
      </div>
      <div id="tocOverlay" class="toc-overlay hidden" aria-hidden="true">
        <div id="tocBackdrop" class="toc-backdrop"></div>
        <aside class="toc-panel" aria-label="Notes table of contents">
          <div class="toc-header">
            <div class="toc-title-block">
              <div class="toc-eyebrow">Navigate</div>
              <h3>Notes</h3>
            </div>
            <button id="tocCloseBtn" class="nav-btn nav-icon-btn toc-close-btn" type="button" aria-label="Close notes menu" title="Close notes menu">
              <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M6 6l12 12" />
                  <path d="M18 6L6 18" />
                </svg>
              </span>
              <span class="sr-only">Close menu</span>
            </button>
          </div>
          <div class="toc-scroll">
            <div id="tocList" class="toc-list"></div>
          </div>
        </aside>
      </div>
      <header class="book-header">
        <div class="header-brand">
          <div class="header-copy">
            <h2>Thank you Ketaki</h2>
            <p class="header-subtitle">for steering the ship</p>
          </div>
        </div>
        <div class="header-progress">
          <div class="progress-meta">
            <span id="progressLabel">Opening Spread</span>
            <span id="progressCount">1 / 43</span>
          </div>
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>
        <div class="header-actions">
          <button id="tocToggleBtn" class="nav-btn nav-icon-btn" type="button" aria-label="Open notes menu" title="Open notes menu">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M4 7h16" />
                <path d="M4 12h16" />
                <path d="M4 17h16" />
              </svg>
            </span>
            <span class="sr-only">Notes menu</span>
          </button>
          <button id="homeBtn" class="nav-btn nav-icon-btn" type="button" aria-label="Back to home" title="Back to home" onclick="window.__goHomeFallback()">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M4 11.5 12 5l8 6.5" />
                <path d="M7.5 10.5V19h9v-8.5" />
                <path d="M10.5 19v-5h3v5" />
              </svg>
            </span>
            <span class="sr-only">Home</span>
          </button>
          <a
            class="nav-btn nav-icon-btn"
            href="AI Images Thank You Note eBook - Printable.pdf"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open printable PDF"
            title="Open printable PDF"
          >
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M7 9V4h10v5" />
                <path d="M6 18H5a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-1" />
                <path d="M7 14h10v6H7z" />
                <path d="M17 11h.01" />
              </svg>
            </span>
            <span class="sr-only">Printable PDF</span>
          </a>
          <button id="fullscreenBtn" class="nav-btn nav-btn-accent nav-icon-btn" type="button" aria-label="Enter fullscreen" title="Enter fullscreen">
            <span class="nav-icon nav-icon-expand" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M8 4H4v4" />
                <path d="M16 4h4v4" />
                <path d="M20 16v4h-4" />
                <path d="M4 16v4h4" />
              </svg>
            </span>
            <span class="sr-only">Fullscreen</span>
          </button>
        </div>
      </header>

      <main class="book-stage">
        <button id="prevBtn" class="edge-nav edge-prev" type="button" aria-label="Previous page" onclick="window.__changeEbookFallback(-1)">
          <span class="edge-nav-inner">
            <span class="edge-nav-arrow" aria-hidden="true">←</span>
            
          </span>
        </button>
        <button id="nextBtn" class="edge-nav edge-next" type="button" aria-label="Next page" onclick="window.__changeEbookFallback(1)">
          <span class="edge-nav-inner">
            
            <span class="edge-nav-arrow" aria-hidden="true">→</span>
          </span>
        </button>
        <div class="book-layout single-note-layout booklet-layout">
          <section class="page-panel solo-panel" aria-label="Interactive note page">
            <div class="page-card interactive-shell solo-shell booklet-shell">
              <div class="page-label">Current Note</div>
              <div id="bookletViewport" class="booklet-viewport" tabindex="0" aria-label="Interactive note page">
                <div id="mybook" class="ebook-book" aria-live="polite"></div>
              </div>
            </div>
          </section>
        </div>
      </main>

      <footer class="book-footer">
        <div id="pageIndicator" class="page-indicator">Page 1 of 43 - Poonam.jpg</div>
        <div class="footer-hint">Use the side arrows to turn pages.</div>
      </footer>
    </div>
  </section>

  <audio id="flipSound" preload="auto">
    <source src="assets/audio/flip.mp3" type="audio/mpeg" />
  </audio>

  <script src="assets/vendor/booklet/jquery-2.1.0.min.js"></script>
  <script src="assets/vendor/booklet/jquery-ui-1.10.4.min.js"></script>
  <script src="assets/vendor/booklet/jquery.easing.1.3.js"></script>
  <script src="assets/vendor/booklet/jquery.booklet.latest.js"></script>
  <script src="assets/booklet-script.js?v=40"></script>
</body>
</html>
